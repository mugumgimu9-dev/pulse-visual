name: Build Mod JAR

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'adopt'
    
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Generate Minecraft sources
      run: gradle genSources
    
    - name: Build mod with Gradle
      run: gradle build
    
    - name: Upload mod artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pulse-visual-mod
        path: build/libs/*.jar
    
    - name: Create GitHub Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: ncipollo/release-action@v1
      with:
        artifacts: "build/libs/*.jar"
        body: "Pulse Visual Mod - Minecraft 1.16.5 Fabric\n\nSee README for installation instructions"
        draft: false
